name: T1D CI

on:
  push:
    paths:
      - 'apps/t1d/**'
      - '.github/workflows/t1d-ci.yml'
  pull_request:
    paths:
      - 'apps/t1d/**'
      - '.github/workflows/t1d-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/t1d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/t1d/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
