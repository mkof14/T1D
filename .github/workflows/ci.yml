name: T1D CI

on:
  push:
    paths:
      - 'src/**'
      - 'server/**'
      - 'api/**'
      - 'public/**'
      - 'tests/**'
      - 'e2e/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vercel.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'server/**'
      - 'api/**'
      - 'public/**'
      - 'tests/**'
      - 'e2e/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vercel.json'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Smoke check
        run: npm run test:smoke

      - name: Build
        run: npm run build

      - name: Perf budget
        run: npm run perf:budget

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: E2E tests
        run: npm run test:e2e

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        run: npm run test:lighthouse
